<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <h1>Create Admin</h1>
      <p class="login-subtitle">Register a new admin account</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
      </div>

      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      @if (success()) {
        <div class="login-success">{{ success() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) { Creating... } @else { Create Admin }
      </button>
    </form>

    <a routerLink="/admin/login" class="back-link">Back to Login</a>
  </div>
</div>
