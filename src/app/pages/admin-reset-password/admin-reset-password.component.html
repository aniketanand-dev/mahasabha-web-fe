<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <h1>Reset Password</h1>
      <p class="login-subtitle">Set a new admin password</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="token">Reset Token</label>
        <input id="token" type="text" [(ngModel)]="token" name="token" required />
      </div>

      <div class="form-group">
        <label for="password">New Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
      </div>

      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      @if (success()) {
        <div class="login-success">{{ success() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) { Updating... } @else { Reset Password }
      </button>
    </form>

    <a routerLink="/admin/login" class="back-link">Back to Login</a>
  </div>
</div>
