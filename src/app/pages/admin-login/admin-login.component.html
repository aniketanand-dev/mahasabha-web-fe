<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="assets/logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'" />
      <h1>Veerashiva Mahasabha</h1>
      <p class="login-subtitle">Admin Portal</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="uname">Username</label>
        <input
          id="uname"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="pwd">Password</label>
        <input
          id="pwd"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>

      @if (error()) {
        <div class="login-error">⚠ {{ error() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        <span>{{ loading() ? 'Signing in...' : 'Sign In' }}</span>
      </button>

      <div class="auth-links">
        <a routerLink="/admin/forgot-password">Forgot password?</a>
      </div>
    </form>

    <div class="login-hint">
      <small>Default: admin / Mahasabha&#64;123</small>
    </div>

    <a routerLink="/" class="back-link">← Back to Website</a>
  </div>
</div>
